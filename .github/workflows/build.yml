name: Release Build

on: workflow_dispatch
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: adopt

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: Get Versions
        run: |
          MC_VERSION=$(./gradlew -q printMCVersion)
          PROJECT_VERSION=$(./gradlew -q printVersion)

          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Version ${{ env.PROJECT_VERSION }} for Minecraft ${{ env.MC_VERSION }}"
          tag_name: "${{ env.PROJECT_VERSION }}-${{ env.MC_VERSION }}"
          generate_release_notes: true
          make_latest: false
          files: build/libs/*.jar            
